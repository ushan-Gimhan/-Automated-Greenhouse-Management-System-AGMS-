spring:
  application:
    name: sensor-telemetry-service
  datasource:
    url: jdbc:mysql://localhost:3306/sensor_db?createDatabaseIfNotExist=true
    username: root
    password: Ijse@1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8083

# Config Server
  cloud:
    config:
      uri: http://localhost:8888
      fail-fast: true

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

# Feign optional
feign:
  hystrix:
    enabled: true

logging:
  level:
    org.springframework.web: INFO
    com.agms: DEBUG