server:
  port: 8085

spring:
  application:
    name: auth-service

  # MySQL Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/gms_auth_db?createDatabaseIfNotExist=true
    username: root
    password: Ijse@1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate Settings
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect # Modern MySQL dialect
    generate-ddl: true

  # Fix for the "spring.config.import" error you had earlier
  # This allows the app to start even if your Config Server isn't ready yet
  config:
    import: "optional:configserver:http://localhost:8888"

# Security Settings
jwt:
  secret: s1yrp6ObnCom75pEyGg4gKJrdV8ViStJVI532bUreW1
  expiration: 3600000 # 1 hour in milliseconds

# Service Discovery Registration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true # Recommended for microservices to communicate via IP